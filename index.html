<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Donanım Marketi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">Donanım Marketi</div>
    <div class="header-right">
        <div class="user-info" id="user-info">
            <span id="login-btn" onclick="showLogin()">Giriş Yap</span> | 
            <span id="register-btn" onclick="showRegister()">Kayıt Ol</span>
        </div>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 Sepet (<span id="cart-count">0</span>)
        </div>
    </div>
</header>

<section class="search-section">
    <select id="category-select">
        <option value="all">Tüm Kategoriler</option>
        <option value="gpu">Ekran Kartı</option>
        <option value="cpu">İşlemci</option>
        <option value="ram">RAM</option>
        <option value="ssd">SSD</option>
    </select>
    <input type="text" id="search-input" placeholder="Ürün ara...">
</section>

<section class="hero">
    <h1>Bilgisayar Donanım Ürünleri</h1>
</section>

<section class="products">
</section>

<script src="script.js"></script>
    <section class="products">

<div class="card" data-category="gpu">
<img src="https://source.unsplash.com/300x200/?gpu">
<h3>RTX 4060</h3>
<p>12500 TL</p>
<button onclick="addToCart('RTX 4060',12500)">Satın Al</button>
</div>

<div class="card" data-category="cpu">
<img src="https://source.unsplash.com/300x200/?cpu">
<h3>Intel i9 13900K</h3>
<p>14500 TL</p>
<button onclick="addToCart('Intel i9 13900K',14500)">Satın Al</button>
</div>

</section>
    <div class="cart-panel" id="cart-panel">
<h2>Sepetim</h2>
<div id="cart-items"></div>
<h3 id="total-price"></h3>
<button onclick="clearCart()">Sepeti Temizle</button>
</div>

<div class="auth-panel hidden" id="auth-panel">
<h2>Kullanıcı Girişi</h2>
<input type="text" placeholder="Kullanıcı Adı">
<input type="password" placeholder="Şifre">
<button>Giriş Yap</button>
</div>

<footer>
<h3>İletişim Bilgileri</h3>
<p>📍 Konum: Kırşehir, Türkiye</p>
<p>📧 info@donanimmarket.com</p>
<p>📞 +90 386 123 45 67</p>
</footer>
</body>
</html>
